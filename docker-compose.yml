services:

  frontend:
    build: ./frontend

    ports:
      - "3000:3000"

    depends_on:
      - backend

  backend:
    build: ./backend

    ports:
      - "5000:5000"

    depends_on:
      - db

  db:
    image: postgres:15

    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: